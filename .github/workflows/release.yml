name: Pulsar Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches Cargo version
        shell: bash
        run: |
          version="$(sed -n 's/^version *= *"\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          tag="${GITHUB_REF_NAME#v}"
          test "$tag" = "$version" || {
            echo "Tag version ($tag) does not match Cargo.toml version ($version)" >&2
            exit 1
          }

      - name: Validate signing secrets
        shell: bash
        run: |
          test -n "${{ secrets.PULSAR_GPG_PRIVATE_KEY }}" || {
            echo "Missing required secret: PULSAR_GPG_PRIVATE_KEY" >&2
            exit 1
          }
          test -n "${{ secrets.PULSAR_GPG_KEY_ID }}" || {
            echo "Missing required secret: PULSAR_GPG_KEY_ID" >&2
            exit 1
          }
          command -v gpg >/dev/null 2>&1 || {
            echo "Missing required command: gpg" >&2
            exit 1
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Import GPG signing key
        shell: bash
        run: |
          temp_key="${RUNNER_TEMP}/pulsar-release.key"
          if base64 --help 2>/dev/null | grep -q -- '--decode'; then
            printf '%s' '${{ secrets.PULSAR_GPG_PRIVATE_KEY }}' | base64 --decode > "$temp_key"
          else
            printf '%s' '${{ secrets.PULSAR_GPG_PRIVATE_KEY }}' | base64 -D > "$temp_key"
          fi
          gpg --batch --import "$temp_key"
          echo "PULSAR_GPG_KEY_ID=${{ secrets.PULSAR_GPG_KEY_ID }}" >> "$GITHUB_ENV"

      - name: Build release artifacts
        shell: bash
        run: ./scripts/build-complete.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pulsar-release-${{ matrix.os }}
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: pulsar-release-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/*.zip
            release-artifacts/*.SHA256SUMS
            release-artifacts/*.SHA256SUMS.asc
