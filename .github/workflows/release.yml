name: Sysray Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      SYSRAY_SKIP_VALIDATION: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches Cargo version
        shell: bash
        run: |
          version="$(sed -n 's/^version *= *"\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          tag="${GITHUB_REF_NAME#v}"
          test "$tag" = "$version" || {
            echo "Tag version ($tag) does not match Cargo.toml version ($version)" >&2
            exit 1
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install RPM tooling and musl
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm musl-tools

      - name: Install musl Rust target
        if: ${{ runner.os == 'Linux' }}
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build release artifacts (non-Linux)
        if: ${{ runner.os != 'Linux' }}
        shell: bash
        run: ./scripts/build-complete.sh

      - name: Build static RPM with musl
        if: ${{ runner.os == 'Linux' }}
        run: |
          VERSION="$(sed -n 's/^version *= *"\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          
          # Build the static binary
          cargo build --release --target x86_64-unknown-linux-musl
          
          # Verify it's truly static
          echo "=== Verifying static build ==="
          file target/x86_64-unknown-linux-musl/release/sysray
          (ldd target/x86_64-unknown-linux-musl/release/sysray && echo "❌ NOT STATIC" && exit 1) || echo "✓ Binary is statically linked"
          
          # Prepare sources
          cp target/x86_64-unknown-linux-musl/release/sysray rpmbuild/SOURCES/
          
          # Create RPM spec file
          cat > rpmbuild/SPECS/sysray.spec <<'EOF'
          Name: sysray
          Version: ${VERSION}
          Release: 1
          Summary: Modern cross-platform system observability engine
          License: Apache-2.0
          BuildArch: x86_64
          Provides: sysray

          %description
          Sysray static binary - 100%% statically linked with musl C library
          No GLIBC dependencies - portable across all Linux distributions.

          %prep

          %build

          %install
          mkdir -p %{buildroot}/usr/local/bin
          cp %{_sourcedir}/sysray %{buildroot}/usr/local/bin/sysray
          chmod 755 %{buildroot}/usr/local/bin/sysray

          %files
          %attr(0755, root, root) /usr/local/bin/sysray

          %changelog
          * Tue Mar 04 2026 Sysray Team <zaba88@hotmail.fr> - ${VERSION}-1
          - Static musl build for maximum portability
          EOF
          
          # Replace VERSION in spec file
          sed -i "s|\${VERSION}|${VERSION}|g" rpmbuild/SPECS/sysray.spec

          # Build RPM
          rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/sysray.spec
          
          # Copy to dist
          mkdir -p dist
          cp rpmbuild/RPMS/x86_64/*.rpm dist/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sysray-release-${{ matrix.os }}
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    environment: release
    env:
      SYSRAY_GPG_PRIVATE_KEY: ${{ secrets.SYSRAY_GPG_PRIVATE_KEY }}
      SYSRAY_GPG_KEY_ID: ${{ secrets.SYSRAY_GPG_KEY_ID }}
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: sysray-release-*
          merge-multiple: true

      - name: Import optional GPG signing key
        if: ${{ env.SYSRAY_GPG_PRIVATE_KEY != '' && env.SYSRAY_GPG_KEY_ID != '' }}
        shell: bash
        run: |
          if ! command -v gpg >/dev/null 2>&1; then
            echo "gpg not available on this runner; publishing unsigned checksums"
            exit 0
          fi

          temp_key="${RUNNER_TEMP}/sysray-release.key"
          if base64 --help 2>/dev/null | grep -q -- '--decode'; then
            printf '%s' "$SYSRAY_GPG_PRIVATE_KEY" | base64 --decode > "$temp_key"
          else
            printf '%s' "$SYSRAY_GPG_PRIVATE_KEY" | base64 -D > "$temp_key"
          fi

          gpg --batch --import "$temp_key"
          echo "SYSRAY_GPG_KEY_ID=$SYSRAY_GPG_KEY_ID" >> "$GITHUB_ENV"

      - name: Sign checksum files when key is available
        if: ${{ env.SYSRAY_GPG_KEY_ID != '' }}
        shell: bash
        run: |
          if ! command -v gpg >/dev/null 2>&1; then
            echo "gpg not available on this runner; publishing unsigned checksums"
            exit 0
          fi

          shopt -s nullglob
          checksum_files=(release-artifacts/*.SHA256SUMS)
          if [[ ${#checksum_files[@]} -eq 0 ]]; then
            echo "No checksum files found to sign" >&2
            exit 1
          fi

          for checksum_file in "${checksum_files[@]}"; do
            gpg --batch --yes --armor --detach-sign \
              --local-user "$SYSRAY_GPG_KEY_ID" \
              --output "${checksum_file}.asc" \
              "$checksum_file"
          done

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/*.zip
            release-artifacts/*.rpm
            release-artifacts/*.exe
            release-artifacts/*.SHA256SUMS
            release-artifacts/*.SHA256SUMS.asc
